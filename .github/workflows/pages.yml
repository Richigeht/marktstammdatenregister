name: Validate Pages Source

on:
  push:
    branches: ["release/main"]
    paths:
      - "site/**"
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --locked

      - name: Build static shell
        run: uv run build-static-site

      - name: Upload validation artifact
        uses: actions/upload-artifact@v4
        with:
          name: pages-shell-preview
          path: dist
